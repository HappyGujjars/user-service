apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Argo Rollout Demo</title>
    </head>
    <body style="font-family: Arial; text-align: center; margin-top: 50px;">
      <h1 style="color: blue;">🚀 BLUE VERSION</h1>
      <h2>Welcome to Argo Rollouts</h2>
      <p>This page is served by Nginx</p>
    </body>
    </html>
---
# apiVersion: v1
# kind: Service
# metadata:
#   name: backend-blue-green
# spec:
#   selector:
#     app: backend
#   ports:
#     - port: 80
#       targetPort: 80
# ---
# apiVersion: v1
# kind: Service
# metadata:
#   name: backend-preview
# spec:
#   selector:
#     app: backend
#   ports:
#     - port: 80
#       targetPort: 80
# ---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: nginx
          image: nginx:1.10

          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "64Mi"
              cpu: "128m"
            limits:
              memory: "128Mi"
              cpu: "256m"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20

          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html

      volumes:
        - name: html
          configMap:
            name: nginx-html

  strategy:
    blueGreen:
      activeService: backend-blue-green
      previewService: backend-preview
      autoPromotionEnabled: false
