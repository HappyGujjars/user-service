apiVersion: v1
kind: Service
metadata:
  name: backend-blue-green
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: backend

